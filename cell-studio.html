<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cell studio</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b1020;
      --panel: #121a2f;
      --text: #e9edf8;
      --muted: #b9c3de;
      --accent: #7c9cff;
      --border: #2a355a;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f8ff;
        --panel: #ffffff;
        --text: #18223d;
        --muted: #516089;
        --accent: #335dff;
        --border: #d8def2;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .hero {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: var(--panel);
      margin-bottom: 16px;
    }
    .hero img { width: 100%; height: 160px; object-fit: cover; display: block; }
    .hero .meta { padding: 14px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, minmax(0,1fr)); } }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }
    label { display:block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    select, input, button, textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 8px;
      padding: 8px;
      font: inherit;
    }
    button { cursor: pointer; background: var(--accent); color: white; border: none; }
    .stats { display:grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap:10px; margin: 12px 0; }
    .stat { padding:10px; border:1px solid var(--border); border-radius: 10px; background: var(--panel); }
    .row { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    @media (max-width: 900px) { .row { grid-template-columns: 1fr; } .stats{grid-template-columns: repeat(2,minmax(0,1fr));} }
    code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    pre { white-space: pre-wrap; margin: 0; }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <picture>
        <source srcset="/images/hero-dark.png" media="(prefers-color-scheme: dark)" />
        <img src="/images/hero-light.png" alt="Cell studio hero" />
      </picture>
      <div class="meta">
        <h1>Cell studio</h1>
        <p class="muted">Explore 1,000 cells, inspect agent logic, and generate a runnable system prompt for any cell.</p>
      </div>
    </div>

    <div class="stats" id="stats"></div>

    <div class="grid">
      <div class="panel"><label for="tier">Tier</label><select id="tier"><option value="">All tiers</option></select></div>
      <div class="panel"><label for="dimension">Dimension</label><select id="dimension"><option value="">All dimensions</option></select></div>
      <div class="panel"><label for="function">Function</label><select id="function"><option value="">All functions</option></select></div>
      <div class="panel"><label for="cellId">Cell ID</label><input id="cellId" type="number" min="1" max="1000" placeholder="Try 777" /></div>
    </div>

    <div class="grid" style="grid-template-columns: 1fr 1fr;">
      <button id="randomBtn">Load random cell</button>
      <button id="loadBtn">Load selected cell</button>
    </div>

    <div class="row">
      <div class="panel">
        <h2>Cell profile</h2>
        <pre id="cellProfile">Loading...</pre>
      </div>
      <div class="panel">
        <h2>Rendered agent prompt</h2>
        <pre id="promptText">Loading...</pre>
      </div>
    </div>
  </div>

<script>
(async function () {
  const [catalogRes, templateRes] = await Promise.all([
    fetch('/data/cell-catalog.json'),
    fetch('/cells/agent-system-prompt.md')
  ]);
  const catalog = await catalogRes.json();
  const template = await templateRes.text();

  const cells = catalog.cells;
  const tiers = catalog.order.tiers;
  const dimensions = catalog.order.dimensions;
  const functions = catalog.order.functions;

  const $ = (id) => document.getElementById(id);
  const tierSelect = $('tier');
  const dimensionSelect = $('dimension');
  const functionSelect = $('function');
  const cellIdInput = $('cellId');

  tiers.forEach(v => tierSelect.insertAdjacentHTML('beforeend', `<option value="${v}">${v}</option>`));
  dimensions.forEach(v => dimensionSelect.insertAdjacentHTML('beforeend', `<option value="${v}">${v}</option>`));
  functions.forEach(v => functionSelect.insertAdjacentHTML('beforeend', `<option value="${v}">${v}</option>`));

  $('stats').innerHTML = `
    <div class="stat"><strong>${cells.length}</strong><div class="muted">Total cells</div></div>
    <div class="stat"><strong>${tiers.length}</strong><div class="muted">Tiers</div></div>
    <div class="stat"><strong>${dimensions.length}</strong><div class="muted">Dimensions</div></div>
    <div class="stat"><strong>${functions.length}</strong><div class="muted">Functions</div></div>
  `;

  function renderPrompt(cell) {
    let out = template;
    out = out.replace(/\{\{cellId\}\}/g, cell.cellId);
    out = out.replace(/\{\{tier\.label\}\}/g, cell.tier.label);
    out = out.replace(/\{\{dimension\}\}/g, cell.dimension);
    out = out.replace(/\{\{function\}\}/g, cell.function);
    out = out.replace(/\{\{agent\.id\}\}/g, cell.agent.id);
    out = out.replace(/\{\{agent\.name\}\}/g, cell.agent.name);

    out = out.replace(/\{\{#each agent\.knowledgeScope\}\}[\s\S]*?\{\{\/each\}\}/, cell.agent.knowledgeScope.map((k) => `- ${k}`).join('\n'));
    out = out.replace(/\{\{#each agent\.operatingDirectives\}\}[\s\S]*?\{\{\/each\}\}/, cell.agent.operatingDirectives.map((d) => `- ${d}`).join('\n'));
    return out;
  }

  function matchCell() {
    const forcedId = Number(cellIdInput.value || 0);
    if (forcedId >= 1 && forcedId <= 1000) return cells.find(c => c.cellId === forcedId);

    return cells.find(c =>
      (!tierSelect.value || c.tier.label === tierSelect.value) &&
      (!dimensionSelect.value || c.dimension === dimensionSelect.value) &&
      (!functionSelect.value || c.function === functionSelect.value)
    );
  }

  function render(cell) {
    if (!cell) {
      $('cellProfile').textContent = 'No matching cell found.';
      $('promptText').textContent = 'No prompt generated.';
      return;
    }
    $('cellProfile').textContent = JSON.stringify(cell, null, 2);
    $('promptText').textContent = renderPrompt(cell);
  }

  $('loadBtn').addEventListener('click', () => render(matchCell()));
  $('randomBtn').addEventListener('click', () => {
    const random = cells[Math.floor(Math.random() * cells.length)];
    cellIdInput.value = random.cellId;
    render(random);
  });

  render(cells[0]);
})();
</script>
</body>
</html>
